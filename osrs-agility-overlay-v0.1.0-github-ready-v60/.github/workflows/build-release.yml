name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test .\OSRSAgilityOverlay.Tests\OSRSAgilityOverlay.Tests.csproj -c Release --no-restore

      - name: Publish win-x64
        run: |
          dotnet publish .\OSRSAgilityOverlay.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            -o .\publish\OSRSAgilityOverlay-win-x64

      - name: Copy default markers
        run: Copy-Item .\markers.json .\publish\OSRSAgilityOverlay-win-x64\markers.json -Force

      - name: Zip publish output
        run: Compress-Archive -Path .\publish\OSRSAgilityOverlay-win-x64\* -DestinationPath .\publish\OSRSAgilityOverlay-win-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSRSAgilityOverlay-win-x64
          path: .\publish\OSRSAgilityOverlay-win-x64.zip

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: .\publish\OSRSAgilityOverlay-win-x64.zip
          body_path: .\RELEASE_NOTES_v0.1.0.md
